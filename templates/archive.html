<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | SAVE Heritage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { background: '#F8F5F0', primary: '#1A1A1A', accent: '#C0392B', burgundy: '#8B1A1A', muted: '#6B6B6B' }, fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] } } } }
    </script>
    <style> body { background-color: #F8F5F0; color: #1A1A1A; line-height: 1.8; } .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 250ms; } </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <header id="navbar" class="fixed top-0 w-full z-50 transition-all bg-transparent py-6 px-8 flex justify-between items-center">
        <a href="/" class="text-2xl text-primary flex items-baseline gap-1.5 hover:opacity-70 transition-opacity">
            <span class="font-bold font-sans tracking-tight">SAVE</span>
            <span class="font-normal font-sans">Heritage</span>
        </a>
        <a href="/archive" class="border border-primary text-primary px-6 py-2.5 rounded-full text-sm font-medium transition-all bg-primary/5">
            Heritage Archive
        </a>
    </header>

    <main class="flex-grow w-full max-w-[1000px] mx-auto px-6 pt-[160px] pb-[120px]">
        <div class="text-center mb-20">
            <h1 class="text-5xl md:text-6xl font-serif text-primary mb-6 tracking-wide">Heritage Archive</h1>
            <p class="text-muted text-lg font-light max-w-2xl mx-auto">A living record of reconstructed and preserved cultural sites.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <!-- Магия Jinja2: Рисуем карточки для ВСЕХ сайтов в базе -->
            {% for site in sites %}
            <div class="bg-white rounded-lg overflow-hidden border border-primary/5 hover:shadow-xl hover:-translate-y-1 transition-all group flex flex-col">
                <div class="h-48 bg-[#eaeaea] w-full relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-tr from-primary/80 to-transparent z-10"></div>
                    <img src="{{ site.image }}" alt="{{ site.title }}" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-700">
                </div>
                <div class="p-6 flex flex-col flex-grow">
                    <div class="mb-3">
                        <h3 class="font-serif font-bold text-xl text-primary leading-tight">{{ site.title }}</h3>
                        <p class="text-muted text-[10px] uppercase tracking-widest mt-1">{{ site.label }}</p>
                    </div>
                    <p class="text-sm text-muted font-light line-clamp-2 mb-4 flex-grow">
                        {{ site.tagline }}
                    </p>
                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-primary/5">
                        <span class="px-2.5 py-1 bg-green-100 text-green-800 text-[9px] font-bold uppercase tracking-widest rounded-sm">Reconstructed</span>
                        <a href="/site/{{ site.id }}" class="text-xs font-semibold text-primary border-b border-primary/30 hover:border-accent hover:text-accent transition-colors pb-0.5">View Details</a>
                    </div>
                </div>
            </div>
            {% endfor %}

        </div>
    </main>

    <footer class="w-full border-t border-primary/10 py-10 px-8 mt-auto">
        <div class="w-full flex justify-center text-sm text-muted">© 2026 SAVE Heritage. All rights reserved.</div>
    </footer>
    
    <script>
        window.addEventListener('scroll', () => {
            const header = document.getElementById('navbar');
            if (window.scrollY > 20) { header.classList.add('backdrop-blur-md', 'bg-background/80', 'border-b', 'border-primary/5'); header.classList.remove('bg-transparent'); } 
            else { header.classList.remove('backdrop-blur-md', 'bg-background/80', 'border-b', 'border-primary/5'); header.classList.add('bg-transparent'); }
        });
    </script>
</body>
</html>
